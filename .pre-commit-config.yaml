repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format


  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace       #- removes trailing spaces
        exclude: README\.md
      - id: end-of-file-fixer         #- ensures newline at EOF
      - id: check-yaml                #- validates .yaml files
      - id: check-toml                #- validates pyproject.toml
      - id: check-merge-conflict      #- blocks accidental merge markers
      - id: debug-statements          #- catches leftover breakpoint()/pdb
